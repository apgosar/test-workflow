name: Metrics
on:
  workflow_dispatch:     # Kept exclusively for manual testing until it works

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      users: read        # Explicitly required to fetch user stats safely
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} # Ensure this matches your Repo Secret name
          user: apgosar
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          filename: github-metrics.svg
